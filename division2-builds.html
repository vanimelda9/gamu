================================================================================
  DIVISION 2 — BUILD REFERENCE
  Project notes & working queue (so they travel with the file)
================================================================================

  PROJECT VISION
  - One game = one page = one chat. This file is the Division 2 page.
  - Future games get their own page + their own chat (reuse this file as a template).
  - Optional hub/landing page could link all games together.

  HOSTING (for later — user has never used GitHub)
  - Goal: publish once, edit freely, friends always see the latest (no re-sending files).
  - Solution: GitHub Pages (free, stable URL). One-time ~15 min setup, walkthrough pending.
  - This artifact is the working/editing copy; GitHub would serve the live link.

  ARCHITECTURE
  - ITEMS database (below) holds canonical, verified facts per item (quality + locked talents).
  - Builds reference items by name; render pulls quality/talents from ITEMS so errors fix once.
  - Stat dots auto-color: red=offense, blue=defense, yellow=skill (see statColor()).
  - Reuse indicator flags identical gear pieces across builds (order-independent stat compare).
  - Always verify D2 item facts via web search — do NOT generate from memory.

--------------------------------------------------------------------------------
  WORKING QUEUE (builds to add)
--------------------------------------------------------------------------------

  STRIKER FAMILY
    Built:  General (everyday Heroic/Legendary), Solo (Memento), HazPro (Backfire + Nurse's), High Escalation (was "e10", Escalation T10)
    (Note: a Striker "anti-tank" variant was considered but dropped — it's just High Escalation Striker with a Ceska/Grupo helm, already covered by the e10 presets.)

  BUILT (formerly queued)

  1. FUTURE INITIATIVE — HEALER  ✓ BUILT
     - Gear: 4p Future Initiative + The Setup OR Alps Summit Avenger backpack (Perfect Opportunistic)
         + BTSU Datagloves.
     - Skills: Reinforcer Chem Launcher + Restorer Hive.
     - Spec: Survivalist (general PvE) / Technician (Incursion/IH Raid, Faraday Field).
     - Weapons: Scorpio + Lefty (Mechanical Animal alt).

  ESCALATION TIER GUIDANCE  ✓ now lives in the Teams tab:
     - Escalation 1–5: Eclipse Protocol CC / Fire — clear weak spawn rooms, speedrun.
     - Escalation 6–10: Future Initiative Healer — buff team bullet damage, survive one-shot mechanics.

  e10 BUILD — STRUCTURE MODEL (finalized) + UI still to be designed:

    *** UI/DISPLAY IS AN OPEN DESIGN QUESTION — do NOT force the HB-style split. ***
    The e10 build is a pool-and-pick system, not a binary fork. Needs its own layout.

    UI PLAN (finalized — PRESETS):
    - e10 tab selected → legend/key block → 4 preset buttons → gear grid updates below → weapons → Salvo callout.
    - 4 preset buttons, labeled by the WILDCARD PAIR (no cute names — gear is the info):
        Ceska + Overdogs | Ceska + Contractor | Hollow + Contractor | Hollow + Overdogs
    - LEGEND above the buttons (damage-type shorthand + few words context):
        * Ceska + Overdogs  — Crit + Amp · spongy add-clearing
        * Ceska + Contractor — Crit + DtA · white armor
        * Hollow + Contractor — DtH + DtA · armor & health
        * Hollow + Overdogs  — DtH + Amp · health + add ramp
      (Amp = Overdogs amplified dmg, multiplicative — not a DtA/DtH bucket.)
    - Each preset = 6-slot grid: chest, knees, backpack, holster = STRIKER (always); helm + gloves = the 2 wildcards.
      (Never run Striker helm in these 4 presets — helm is always a wildcard.)
    - SALVO CALLOUT (prominent, standalone — NOT buried): optional — swap the holster to Salvo (+10% RoF,
      faster Striker stacking) on any preset if you'll get value from the fire rate. Doing so makes the
      helm go Striker and you'd drop to one helm/gloves wildcard (the exception to the 4-preset structure).

    THE REAL STRUCTURE:
    - Always Striker (e10 core, 3 fixed pieces): CHEST + KNEEPADS + BACKPACK.
      (Backpack-as-wildcard is the Solo/Memento build only — in e10 the backpack is always Striker.)
    - Flex zone = {HELM, GLOVES, HOLSTER}: pick 2 to be WILDCARDS, the 3rd stays Striker.
      (This keeps 4pc Striker total: chest + knees + backpack + 1 of helm/gloves/holster.)

    HELM determines wildcard count:
    - Striker helm (4pc-keeper) → 2 wildcard slots free (gloves + holster).
    - Ceska/Grupo or Hollow Man helm (the helm IS a wildcard) → 1 wildcard slot left (gloves or holster).

    WILDCARD POOL (pick 2 across the flex zone):
    - Hollow Man (helm): +10% DtH (+21% if prototyped w/ red core). Consistent vs single big health
      targets (bosses, Chungas, dogs) — no kill setup needed.
    - Overdogs (gloves, EXOTIC): amplified dmg, ramps off KILLS → throughput/field-clearing, not a
      pure boss piece (falls off in kill-starved boss standoff). Strongest in spongy e10 waves.
    - Contractor's (gloves): +8% DtA + Petrov +10% LMG. Armor-punching, LMG sections w/ heavy white bars.
    - Ceska/Grupo (helm or other): crit filler. Get CHC to 60% cap, rest into CHD toward +120% CHD.
      Ceska = +8% CHC (while climbing); Grupo = +13% CHD (once capped).
    - Salvo (holster): +10% RoF from one slot. Loses ~1%/bullet to perfect Ceska on paper but builds
      Striker stacks 10% faster — feels strong in e10 practice.
    - Fox's Prayer (knees): QUESTIONABLE / likely OUT. Attribute Tax math: Ceska/Grupo crit beats Fox's
      on a Striker LMG (its +10% Rifle brand is wasted). Only BiS on a true Rifle build.

    HEADLINE COMBOS (each = 2 wildcards; the 3rd flex slot stays Striker):
    - Hollow + Contractor → GENERAL (covers armor via DtA → health via DtH; no kill dependency)
    - Hollow + Overdogs → boss/heavy + add throughput (Hollow carries the big health target,
      Overdogs ramps off the adds around it)
    - Overdogs + Ceska/Grupo → throughput field-clear w/ crit backing
    - (+ variations: any damage piece + Salvo for faster stacking, or + Ceska/Grupo for crit fill)

    WEAPONS: ~99% LMG (M249B + Frenzy). Mods CHC/CHD priority, NO laser (no pulse synergy on Striker).
    Weapon 3rd attribute: DTTOOC, or CHC on LMGs.
    Non-LMG high-end weapon talents (in flux): Killer (+70% CHD on kill, mostly solo), Measured,
      Strained (beats Optimist even on FAMAS for red Striker; Perfect Optimist on F2000 ≈ matches),
      Fast Hands, Ranger (great w/ Ouroboros close + Ranger AR long, Coyote's covers crit gap),
      Frenzy (only where uptime is maintainable).

    STILL TBD: final call on Fox's (in or out); exact LMG underbarrel. (Preset gear rolls now filled as a base — optimize via CHC checker.)

================================================================================

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Division 2 — Build Reference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050608;
    --panel: #14171f;
    --panel-2: #1b1f29;
    --line: rgba(255,255,255,0.07);
    --line-2: rgba(255,255,255,0.13);
    --text: #eef0f5;
    --text-mid: #9ca1b0;
    --text-dim: #5a5f70;
    --orange: #ff7a18;
    --red: #ff5b4a;
    --accent-blue: #3f9be0;

    --q-exotic: #e8772e;
    --q-exotic-2: #b04d12;
    --q-named: #f0a81e;
    --q-named-2: #9c6b08;
    --q-set: #25c08a;
    --q-set-2: #0f7a55;
    --q-high: #d9b54a;
    --q-high-2: #8a6d18;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 880px; margin: 0 auto; }

  /* Header */
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--line); }
  .logo {
    width: 34px; height: 34px; flex-shrink: 0;
    border: 2px solid var(--orange); transform: rotate(45deg);
    position: relative;
  }
  .logo::after { content: ""; position: absolute; inset: 6px; background: var(--orange); }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  header h1 small { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.18em; color: var(--text-dim); margin-top: 2px; }
  .version { margin-left: auto; align-self: flex-start; background: none; border: none; cursor: pointer; font-family: 'Consolas', ui-monospace, monospace; font-size: 11px; letter-spacing: 0.08em; color: var(--text-dim); padding: 2px 4px; }
  .version:hover { color: var(--orange); }
  .cl-list { display: flex; flex-direction: column; gap: 0; max-width: 760px; }
  .cl-row { display: grid; grid-template-columns: 100px 1fr; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .cl-row:last-child { border-bottom: none; }
  .cl-ver { font-family: 'Consolas', ui-monospace, monospace; font-size: 13px; font-weight: 700; color: var(--orange); }
  .cl-notes { display: flex; flex-direction: column; gap: 4px; }
  .cl-note { font-size: 13px; color: var(--text-mid); line-height: 1.45; padding-left: 13px; position: relative; }
  .cl-note::before { content: "›"; position: absolute; left: 0; color: var(--text-dim); }
  @media (max-width: 560px) { .cl-row { grid-template-columns: 1fr; gap: 5px; } }

  /* Build tabs — grouped by role */
  .tabs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
  .tab-group { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .tab-group-label {
    flex-shrink: 0; width: 92px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);
    text-align: right; padding-right: 4px;
  }
  .tab-group-btns { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .tab {
    background: var(--panel); color: var(--text-mid);
    border: 1px solid var(--line-2); border-radius: 0;
    padding: 9px 18px; font-size: 13px; font-weight: 600; font-family: inherit;
    letter-spacing: 0.03em; cursor: pointer; position: relative;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }
  .tab:hover { color: var(--text); border-color: var(--text-dim); }
  .tab.active { background: var(--orange); border-color: var(--orange); color: #1a0e00; }
  .tab-tools-row { display: flex; gap: 6px; padding-left: 100px; margin-top: 4px; padding-top: 12px; border-top: 1px dashed var(--line-2); }

  @media (max-width: 560px) {
    .tab-group { align-items: flex-start; }
    .tab-group-label { width: 100%; text-align: left; padding-right: 0; margin-bottom: 2px; }
    .tab-tools-row { padding-left: 0; }
  }

  /* Section header */
  .sec-head { display: flex; align-items: center; gap: 10px; margin: 1.75rem 0 0.9rem; }
  .sec-head .bar { width: 3px; height: 14px; background: var(--orange); }
  .sec-head h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-mid); }
  .sec-head .rule { flex: 1; height: 1px; background: var(--line); }

  /* angular card base w/ quality wash */
  .qcard { position: relative; background: var(--panel); border: 1px solid var(--line); overflow: hidden;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%); }
  .qcard::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .qcard.q-exotic::before { background: var(--q-exotic); }
  .qcard.q-named::before  { background: var(--q-named); }
  .qcard.q-set::before    { background: var(--q-set); }
  .qcard.q-high::before   { background: var(--q-high); }
  .qcard.q-exotic { background: #241813; }
  .qcard.q-named  { background: #241e10; }
  .qcard.q-set    { background: #13201b; }
  .qcard.q-high   { background: #221e12; }

  /* Recommended weapon hero slots */
  .loadout { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .slot { padding: 14px 16px 14px 18px; min-height: 84px; display: flex; flex-direction: column; justify-content: center; }
  .slot .kick { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
  .slot .nm { font-size: 18px; font-weight: 700; letter-spacing: 0.01em; line-height: 1.1; }
  .slot.q-exotic .nm { color: var(--q-exotic); }
  .slot.q-named  .nm { color: var(--q-named); }
  .slot.q-set    .nm { color: var(--q-set); }
  .slot.q-high   .nm { color: var(--text); }
  .slot .sub { font-size: 12px; color: var(--text-mid); margin-top: 5px; }

  /* Gear grid */
  .gear { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .g { padding: 12px 14px 14px 16px; }
  .g-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .g-slot { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .g-brand { font-size: 14px; font-weight: 700; margin-bottom: 9px; }
  .q-exotic .g-brand { color: var(--q-exotic); }
  .q-named  .g-brand { color: var(--q-named); }
  .q-set    .g-brand { color: var(--q-set); }
  .stat { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-mid); margin-bottom: 3px; }
  .stat i { width: 12px; height: 12px; flex-shrink: 0; border: 1.5px solid var(--red); border-radius: 50%; position: relative; }
  .stat i::after { content:""; position:absolute; inset: 2.5px; background: var(--red); border-radius: 50%; }
  .stat i.dot-red    { border-color: #ff5b4a; }
  .stat i.dot-red::after    { background: #ff5b4a; }
  .stat i.dot-blue   { border-color: #4a9eff; }
  .stat i.dot-blue::after   { background: #4a9eff; }
  .stat i.dot-yellow { border-color: #f0b429; }
  .stat i.dot-yellow::after { background: #f0b429; }
  .g-talent { font-size: 12px; font-weight: 600; color: var(--orange); margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line); display: flex; gap: 7px; align-items: center; }
  .stat-mod { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--line); }
  .mod-tag { margin-left: 6px; font-size: 8.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-dim); border: 1px solid var(--line-2); border-radius: 2px; padding: 0 4px; }
  .stat-mod-empty { opacity: 0.55; }
  .stat i.dot-empty { border-color: var(--line-2); }
  .stat i.dot-empty::after { display: none; }
  .mod-empty-txt { font-style: italic; color: var(--text-dim); }
  .g-fixed { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line); font-style: italic; }
  .qcard.q-multi::before { background: linear-gradient(var(--q-named) 50%, var(--q-high) 50%); }
  .qcard.q-multi { background: #1c1a15; }
  .g-sources { display: flex; flex-direction: column; gap: 7px; margin-bottom: 4px; }
  .g-src { display: grid; grid-template-columns: 1fr auto; gap: 6px 8px; align-items: center; }
  .g-src-name { font-size: 15px; font-weight: 700; }
  .g-src.q-named .g-src-name { color: var(--q-named); }
  .g-src.q-high .g-src-name { color: var(--text); }
  .g-src-tal { grid-column: 1 / -1; font-size: 12px; color: var(--orange); font-weight: 600; }
  .g-src.q-high .g-src-tal { color: var(--text-mid); }
  .g-talent::before { content: "◆"; font-size: 9px; color: var(--orange); }
  .reuse { font-size: 10.5px; color: #5dcaa5; margin-top: 8px; padding-top: 7px; border-top: 1px dashed var(--line); font-weight: 500; }

  /* dual-path split gear card — stays in normal grid cell */
  .g-split { background: var(--panel); border: 1px solid var(--line); overflow: hidden;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%); }
  .split-top { padding: 11px 14px 7px; }
  .split-body { display: grid; grid-template-columns: 1fr 1fr; }
  .split-half { padding: 5px 10px 12px 12px; position: relative; }
  .split-half::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .split-half:nth-child(2) { border-left: 1px solid var(--line); }
  .split-half.q-exotic::before { background: var(--q-exotic); }
  .split-half.q-named::before  { background: var(--q-named); }
  .split-half.q-set::before    { background: var(--q-set); }
  .split-half.q-high::before   { background: var(--q-high); }
  .split-half.q-exotic { background: #241813; }
  .split-half.q-named  { background: #241e10; }
  .split-half.q-set    { background: #13201b; }
  .split-half.q-high   { background: #221e12; }
  .split-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  .split-brand { font-size: 12px; line-height: 1.2; margin-bottom: 7px; }
  .split-half.q-exotic .split-brand { color: var(--q-exotic); }
  .split-half.q-named  .split-brand { color: var(--q-named); }
  .split-half.q-set    .split-brand { color: var(--q-set); }
  .split-half .stat { font-size: 11px; }

  /* badges */
  .tag { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 0;
    clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px); }
  .tag.q-exotic { color: #1a0e00; background: var(--q-exotic); }
  .tag.q-named  { color: #1a1100; background: var(--q-named); }
  .tag.q-set    { color: #02140d; background: var(--q-set); }
  .tag.q-high   { color: #0c0e12; background: var(--q-high); }

  /* skills + spec */
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .two-spec { grid-template-columns: 38fr 62fr; }
  @media (max-width: 560px) { .two-spec { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); padding: 12px 15px;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%); }
  .panel .it { font-size: 13px; color: var(--text); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
  .panel .it:last-child { margin-bottom: 0; }
  .panel .it::before { content: ""; width: 4px; height: 4px; background: var(--orange); flex-shrink: 0; }
  .panel .it-core { color: var(--q-named); font-weight: 700; }
  .panel .it-core::before { background: var(--q-named); width: 5px; height: 5px; }
  .panel .spec-opt { align-items: flex-start; line-height: 1.5; margin-bottom: 9px; font-size: 12.5px; color: var(--text-mid); }
  .panel .spec-opt::before { margin-top: 6px; }
  .spec-name { color: var(--q-named); font-weight: 700; }
  .spec-core { color: var(--orange); }
  .spec-ideal { color: #f5d020; }
  .spec-dps { color: var(--accent-blue); }

  /* weapon options */
  .opt-grp { margin-bottom: 12px; }
  .opt-grp > .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .opt { padding: 11px 15px; margin-bottom: 8px; }
  .opt-h { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 6px; }
  .opt-nm { font-size: 14px; font-weight: 700; }
  .q-exotic .opt-nm { color: var(--q-exotic); }
  .q-named  .opt-nm { color: var(--q-named); }
  .q-high   .opt-nm { color: var(--text); }
  .rec-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--orange); border: 1px solid var(--orange); padding: 2px 8px;
    clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px); }
  .note-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mid); border: 1px solid var(--line-2); padding: 2px 8px;
    clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px); }
  .opt-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ln { font-size: 12px; color: var(--text-mid); margin-top: 3px; line-height: 1.5; }
  .ln .k { color: var(--text-dim); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; margin-right: 6px; }
  .ln.tal { color: var(--orange); }
  .ln.tal .k { color: var(--orange); }
  .ln.aka { color: var(--text-dim); font-style: italic; }

  /* spec warning banner */
  .warn { display: flex; gap: 11px; align-items: flex-start; background: rgba(240,168,30,0.1); border: 1px solid rgba(240,168,30,0.4); border-left: 3px solid var(--q-named); padding: 11px 14px; margin: 0 0 10px; font-size: 12.5px; color: #f0c869; line-height: 1.5; }
  .warn-ic { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; background: var(--q-named); color: #1a1100; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; margin-top: 1px; }

  .tab-tool { border-color: var(--accent-blue); color: var(--accent-blue); }
  .tab-tool.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #04121f; }

  /* CHC Checker tool */
  .chc-tool { max-width: 600px; }
  .chc-readout { background: var(--panel); border: 1px solid var(--line-2); border-left: 3px solid var(--accent-blue); padding: 16px 18px; margin-bottom: 16px; }
  .chc-readout.good { border-left-color: var(--q-set); }
  .chc-readout.over { border-left-color: var(--red); }
  .chc-big { font-size: 34px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); line-height: 1; }
  .chc-cap { font-size: 16px; font-weight: 500; color: var(--text-dim); margin-left: 6px; }
  .chc-bar { height: 8px; background: var(--bg); border: 1px solid var(--line); margin: 12px 0 10px; position: relative; overflow: hidden; }
  .chc-fill { height: 100%; background: var(--accent-blue); transition: width 0.12s ease; }
  .chc-fill.over { background: var(--red); }
  .chc-status { font-size: 13px; font-weight: 600; }
  .chc-under { color: var(--accent-blue); }

// Look up an item's canonical quality; fall back to inline if not in DB.
function itemQuality(name, fallback) {
  return (ITEMS[name] && ITEMS[name].quality) || fallback || "high";
}
function itemTalent(name) {
  return ITEMS[name] && ITEMS[name].talent;
}
function itemAka(name) {
  return ITEMS[name] && ITEMS[name].aka;
}
function itemType(name) {
  return ITEMS[name] && ITEMS[name].type;
}

// Classify a gear/weapon stat into its attribute color: red (offense), blue (defense), yellow (skill).
function statColor(stat) {
  const s = stat.toLowerCase();
  // Yellow — skill / utility
  if (s.includes('skill') || s.includes('status effect') || s.includes('repair') || s.includes('haste')) return 'yellow';
  // Blue — defensive (note: "Health Damage" is offensive, so exclude it)
  if (s.includes('health damage')) return 'red';
  if (s.includes('armor') || s.includes('health') || s.includes('protection') ||
      s.includes('resistance') || s.includes('hazard')) return 'blue';
  // Red — offensive (weapon damage, crit, DTTOC, etc.)
  return 'red';
}

// (Exotic weapons reconfigure this minor at the bench; high-end/named just roll it.)
function thirdStat(w) {
  const item = ITEMS[w.name];
  const t = (itemType(w.name) || '').toUpperCase();
  const WEAPON_TYPES = ['LMG', 'AR', 'SMG', 'SHOTGUN', 'RIFLE', 'MMR', 'PISTOL'];
  if (!WEAPON_TYPES.includes(t)) return null; // only weapons
  if (item && item.thirdStat) return item.thirdStat; // per-weapon override (e.g. Ravenous → DTA, Capacitor → skill)
  return t === 'LMG' ? 'CHD' : 'DTTOOC';
}

function slot(kick, w) {
  const q = itemQuality(w.name, w.quality);
  const dbTalent = itemTalent(w.name);
  const ts = q === 'exotic' ? thirdStat(w) : null;
  const sub = q === 'exotic'
    ? (ts ? `Exotic — 3rd stat → ${ts}` : 'Exotic — fixed roll')
    : (w.talent ? w.talent.split(' — ')[0] : (dbTalent || ''));
  return `<div class="qcard slot q-${q}">
    <div class="kick">${kick}</div>
    <div class="nm">${w.name}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

function opt(w) {
  const q = itemQuality(w.name, w.quality);
  const isExotic = q === 'exotic';
  // For named items, prefer the locked DB talent; for high-end, use the build's chosen talent.
  const dbTalent = itemTalent(w.name);
  const talent = (q === 'named' && dbTalent) ? dbTalent : w.talent;
  return `<div class="qcard opt q-${q}">
    <div class="opt-h">
      <span class="opt-nm">${w.name}</span>
      <span class="tag q-${q}">${QLABEL[q]}</span>
      ${w.rec ? `<span class="rec-tag">Recommended</span>` : ''}
      ${w.note ? `<span class="note-tag">${w.note}</span>` : ''}
    </div>
    ${isExotic
      ? `${thirdStat(w) ? `<div class="ln"><span class="k">3rd stat</span>reconfigure → ${thirdStat(w)}</div>` : ''}`
      : `
        ${w.stats && w.stats !== '—' ? `<div class="ln"><span class="k">Stats</span>${w.stats}</div>` : ''}
        ${talent && talent !== '—' ? `<div class="ln tal"><span class="k">Talent</span>${talent}</div>` : ''}
        ${w.mods ? `<div class="ln"><span class="k">Mods</span>${w.mods}</div>` : ''}
      `}
    ${itemAka(w.name) ? `<div class="ln aka"><span class="k">Also</span>${itemAka(w.name)}</div>` : ''}
  </div>`;
}

// Build groups by role. Order here = display order. Builds listed by key.
const BUILD_GROUPS = [
  { role: "DPS",        ids: ["striker-solo", "striker-e10", "ts-lmg"] },
  { role: "DPS Hybrid", ids: ["striker-hazpro", "hb-lmg", "hunters-fury"] },

  const teamsTab = `<button class="tab tab-tool ${active==='teams'?'active':''}" onclick="renderTeams()">👥 Teams</button>`;

function secHead(t) { return `<div class="sec-head"><span class="bar"></span><h2>${t}</h2><span class="rule"></span></div>`; }

// Render skill items; highlight any flagged core/mandatory/req/S as a standout pick.
function skillItems(skills) {
  return skills.map(s => `<div class="it${/\bcore\b|\bmandatory\b|\breq\.?\b|\(S\b/i.test(s) ? ' it-core' : ''}">${s}</div>`).join('');
}

// Spec panel: rich list when specOptions present (e10/TS), else the single spec name.
function specPanel(b) {
  if (b.specOptions && b.specOptions.length) {
    return b.specOptions.map(o =>
      `<div class="it spec-opt"><span class="spec-name spec-${o.tier || 'core'}">${o.name}</span> ${o.detail}</div>`
    ).join('');
  }
  return `<div class="it">${b.specialization}</div>`;
}

// Canonical display order for stats so identical pieces always render the same way.
const STAT_ORDER = [
  "Weapon Damage", "Assault Rifle Damage", "LMG Damage", "SMG Damage", "Shotgun Damage", "Rifle Damage", "Pistol Damage",
  "Critical Hit Chance", "Critical Hit Damage", "Headshot Damage", "Damage to TOC", "DTTOC", "Health Damage",
  "Skill Tier", "Skill Damage", "Skill Haste", "Status Effects", "Repair Skills",
  "Armor", "Health", "Hazard Protection", "Protection from Elites"
];
function orderStats(stats) {
  // The core attribute is always the FIRST listed stat and must stay on top (matches in-game,
  // where the top slot is the core). Only the remaining attributes get canonical ordering.
  const arr = (stats || []).slice();
  if (arr.length <= 1) return arr;
  const core = arr[0];
  const rest = arr.slice(1).sort((a, b) => {
    const ia = STAT_ORDER.indexOf(a), ib = STAT_ORDER.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });
  return [core, ...rest];
}

// Normalize a gear piece into a comparable signature (brand + stat makeup + talent).
// Stats are sorted so order doesn't matter — only the actual makeup counts.
function pieceSig(p) {
  const stats = (p.stats || []).slice().sort().join('|');
  return `${p.brand}::${stats}::${p.talent || ''}`;
}

// Find other builds that use an identical piece (same brand, stats, talent) in the same slot.
function sharedWith(currentId, slot, piece) {
  const sig = pieceSig(piece);
  const matches = [];
  for (const [id, b] of Object.entries(builds)) {
    if (id === currentId) continue;
    (b.gear || []).forEach(g => {
      if (g.slot !== slot) return;
      if (g.toggle || g.sources) return; // toggle / multi-source slots aren't compared for reuse
      const candidates = g.paths ? g.paths : [g];
      candidates.forEach(c => { if (pieceSig(c) === sig) matches.push(b.name); });
    });
  }
  return [...new Set(matches)];
}

// General reminder shown on every build.
function specWarning(b) {
  const lines = [];
  // Default spec/weapon warning, unless the build opts out (e.g. a healer where weapon dmg isn't the point).
  if (!b.noSpecWarning) lines.push("Make sure your specialization's weapon-damage bonuses match your selected weapons.");
  if (b.warnings) b.warnings.forEach(w => lines.push(w));
  if (!lines.length) return '';
  return lines.map(l => `<div class="warn"><span class="warn-ic">!</span><div>${l}</div></div>`).join('');
}

// Render a single normal gear card (non-split).
let hfMode = {}; // buildId -> 'solo' | 'group'
function gearCard(id, g) {
  // Toggle slot (solo/group backpack): pick the active variant, render a switch.
  if (g.toggle) {
    const mode = hfMode[id] || 'solo';
    const active = g.toggle[mode];
    const inner = gearCard(id, Object.assign({ slot: g.slot }, active));
    const sw = `<div class="gtoggle">
      <button class="gtoggle-btn ${mode==='solo'?'on':''}" onclick="setHfMode('${id}','solo')">Solo</button>
      <button class="gtoggle-btn ${mode==='group'?'on':''}" onclick="setHfMode('${id}','group')">Group</button>
    </div>`;
    return inner.replace('<div class="g-top">', sw + '<div class="g-top">');
  }
  const gq = itemQuality(g.brand, g.quality);
  const gt = (gq !== 'exotic') ? (itemTalent(g.brand) || g.talent) : null;
  const shared = (gq !== 'exotic') ? sharedWith(id, g.slot, g) : [];
  // Fall back to the DB's canonical note for this item (e.g. Overdogs) when the piece has none.
  const dbItem = ITEMS[g.brand] || {};
  const noteHead = g.noteHead || dbItem.noteHead;
  const note = g.note || dbItem.note;
  // Multi-source piece: one slot, multiple source items of different quality (e.g. named "The Setup" vs high-end "Alps").
  if (g.sources) {
    return `<div class="qcard g q-multi">
      <div class="g-top"><span class="g-slot">${g.slot}</span></div>
      <div class="g-sources">
        ${g.sources.map(s => {
          const locked = s.quality === 'named' || /^Perfect\b/.test(s.talent || '');
          return `<div class="g-src q-${s.quality}"><span class="g-src-name">${s.name}</span><span class="tag q-${s.quality}">${QLABEL[s.quality]}</span><span class="g-src-tal">${s.talent}<span class="pill-t ${locked?'lock':'roll'}">T</span></span></div>`;
        }).join('')}
      </div>
      ${(() => {
        const hasModSlot = ["Mask", "Backpack", "Chest"].includes(g.slot);
        const body = orderStats(g.stats).map(st => `<div class="stat"><i class="dot-${statColor(st)}"></i>${st}</div>`).join('');
        const modLine = !hasModSlot ? ''
          : (g.mod
              ? `<div class="stat stat-mod"><i class="dot-${statColor(g.mod)}"></i>${g.mod}<span class="mod-tag">MOD</span></div>`
              : `<div class="stat stat-mod stat-mod-empty"><i class="dot-empty"></i><span class="mod-empty-txt">open mod slot</span><span class="mod-tag">MOD</span></div>`);
        return body + modLine;
      })()}
      ${g.talentDesc ? (Array.isArray(g.talentDesc)
        ? `<div class="g-notelist">${g.talentDesc.map(n => `<div class="g-bullet">${n}</div>`).join('')}</div>`
        : `<div class="g-talnote">${g.talentDesc}</div>`) : ''}
    </div>`;
  }
  return `<div class="qcard g q-${gq}">
    <div class="g-top"><span class="g-slot">${g.slot}</span><span class="tag q-${gq}">${QLABEL[gq]}</span></div>
    <div class="g-brand">${g.brand}</div>
    ${gq === 'exotic'
      ? (() => {
          // Exotic cores: use build-supplied stats if present, else the DB's canonical cores.
          const cores = (g.stats && g.stats.length) ? g.stats : (dbItem.cores || []);
          const coreLines = cores.map(s => `<div class="stat"><i class="dot-${statColor(s)}"></i>${s}</div>`).join('');
          // Exotic Mask/Backpack/Chest still have a mod slot (e.g. Memento).
          const hasModSlot = ["Mask", "Backpack", "Chest"].includes(g.slot);
          const modLine = !hasModSlot ? ''
            : (g.mod
                ? `<div class="stat stat-mod"><i class="dot-${statColor(g.mod)}"></i>${g.mod}<span class="mod-tag">MOD</span></div>`
                : `<div class="stat stat-mod stat-mod-empty"><i class="dot-empty"></i><span class="mod-empty-txt">open mod slot</span><span class="mod-tag">MOD</span></div>`);
          return `${coreLines}${modLine}<div class="g-fixed">Exotic — fixed roll</div>`;
        })()
      : (() => {
          // Mask/Backpack/Chest have a mod slot. The mod value lives in its own g.mod field
          // (set during the data migration); stats holds only core + attributes. If a mod-slot
          // piece has no g.mod, show an empty slot so the count is still right.
          const hasModSlot = ["Mask", "Backpack", "Chest"].includes(g.slot);
          const bodyStats = orderStats(g.stats);
          const modLine = !hasModSlot ? ''
            : (g.mod
                ? `<div class="stat stat-mod"><i class="dot-${statColor(g.mod)}"></i>${g.mod}<span class="mod-tag">MOD</span></div>`
                : `<div class="stat stat-mod stat-mod-empty"><i class="dot-empty"></i><span class="mod-empty-txt">open mod slot</span><span class="mod-tag">MOD</span></div>`);
          return `${bodyStats.map(s => `<div class="stat"><i class="dot-${statColor(s)}"></i>${s}</div>`).join('')}
         ${modLine}
         ${gt ? `<div class="g-talent">${gt}</div>` : ''}`;
        })()}
    ${g.talentNote ? (Array.isArray(g.talentNote)
      ? `<div class="g-notelist">${g.talentNote.map(n => `<div class="g-bullet">${n}</div>`).join('')}</div>`
      : `<div class="g-talnote">${g.talentNote}</div>`) : ''}
    ${note ? (Array.isArray(note)
      ? `<div class="g-notelist">${noteHead ? `<div class="g-notehead">${noteHead}</div>` : ''}${note.map(n => `<div class="g-bullet">${n}</div>`).join('')}</div>`
      : `<div class="g-talnote">${note}</div>`) : ''}
    ${shared.length ? `<div class="reuse">↻ Same as ${shared.join(', ')}</div>` : ''}
  </div>`;
}
function setHfMode(id, mode) {
  hfMode[id] = mode;
  render(id);
}

// Render a preset build (e10): updates the grid + active button for the chosen preset.
let activePreset = {};
function renderPreset(buildId, presetId) {
  const b = builds[buildId];
  const preset = b.presets.find(p => p.id === presetId) || b.presets[0];
  activePreset[buildId] = preset.id;

  // assemble the 6-slot grid: wildcards in their slots, core fills the rest, canonical slot order
  const SLOT_ORDER = ["Mask", "Backpack", "Chest", "Gloves", "Holster", "Kneepads"];
  const bySlot = {};
  b.core.forEach(c => bySlot[c.slot] = c);
  preset.wildcards.forEach(w => bySlot[w.slot] = w);
  const gridCards = SLOT_ORDER.filter(s => bySlot[s]).map(s => gearCard(buildId, bySlot[s])).join('');

  document.getElementById("preset-zone").innerHTML = `<div class="gear">${gridCards}</div>`;
  document.querySelectorAll('#preset-btns .preset-row').forEach(el => {
    el.classList.toggle('active', el.dataset.preset === preset.id);
  });
}

// ===== CHC Checker (standalone tool, session-only) =====
// Structured by slot. Gear slot: innate (brand) + roll1 + roll2 + mod (mod only on mask/chest/back).
// Weapon: innate + up to 3 crit mod slots. Coyote's: count 0-4 x per-Coyote group buff.
const CHC_CAP = 60;
// Coyote's Mask is range-bracket based, not a flat count. For CHC purposes only these discrete
// contributions matter (2 Coyotes is the cap for CHC):
//   none = 0; one mask shooting past 25m = +25% CHC; two masks stacked (team) = +35% CHC sweet spot.
const COYOTE_OPTIONS = [
  { key: "none", label: "None", chc: 0,  note: "no Coyote's CHC" },
  { key: "b10",  label: "+10%", chc: 10, note: "1 mask, target 15-25m" },
  { key: "b25",  label: "+25%", chc: 25, note: "1 mask, target past 25m" },
  { key: "b35",  label: "+35%", chc: 35, note: "2 masks: 15m + 25m" },
];

const GEAR_SLOTS = [
  { key: "mask",     label: "Mask",     mod: true  },
  { key: "backpack", label: "Backpack", mod: true  },
  { key: "chest",    label: "Chest",    mod: true  },
  { key: "gloves",   label: "Gloves",   mod: false },
  { key: "holster",  label: "Holster",  mod: false },
  { key: "knees",    label: "Kneepads", mod: false },
];

let chc = { shd:"", weapon: { innate:"", mod1:"", mod2:"", mod3:"" }, gear: {}, coyote: "none" };
GEAR_SLOTS.forEach(s => chc.gear[s.key] = { innate:"", roll1:"", roll2:"", mod:"" });

function n(v){ return parseFloat(v) || 0; }
function coyoteChc(){ const o = COYOTE_OPTIONS.find(c => c.key === chc.coyote); return o ? o.chc : 0; }
function chcTotal(){
  let t = 0;
  t += n(chc.shd);
  const w = chc.weapon; t += n(w.innate)+n(w.mod1)+n(w.mod2)+n(w.mod3);
  GEAR_SLOTS.forEach(s => { const g = chc.gear[s.key]; t += n(g.innate)+n(g.roll1)+n(g.roll2)+n(g.mod); });
  t += coyoteChc();
  return t;
}
function chcField(path, ph){
  const val = path.split('.').reduce((o,k)=>o[k], chc);
  return `<input class="chc-f" type="number" step="0.1" value="${val}" placeholder="${ph}" oninput="chcSet('${path}', this.value)" />`;
}
function renderChcChecker(){
  tabs('chc-checker');
  const weaponRow = `
    <div class="chc-slot">
      <div class="chc-slot-name">Weapon</div>
      <div class="chc-fields">
        <label>Innate ${chcField('weapon.innate','0')}</label>
        <label>Mod 1 ${chcField('weapon.mod1','0')}</label>
        <label>Mod 2 ${chcField('weapon.mod2','0')}</label>
        <label>Mod 3 ${chcField('weapon.mod3','0')}</label>
      </div>
    </div>`;
  const gearRows = GEAR_SLOTS.map(s => `
    <div class="chc-slot">
      <div class="chc-slot-name">${s.label}</div>
      <div class="chc-fields">
        <label>Innate ${chcField('gear.'+s.key+'.innate','0')}</label>
        <label>Roll 1 ${chcField('gear.'+s.key+'.roll1','0')}</label>
        <label>Roll 2 ${chcField('gear.'+s.key+'.roll2','0')}</label>
        ${s.mod ? `<label>Mod ${chcField('gear.'+s.key+'.mod','0')}</label>` : `<label class="chc-namod">no mod</label>`}
      </div>
    </div>`).join('');
  document.getElementById("content").innerHTML = `
    ${secHead("CHC Checker")}
    <div class="chc-tool">
      <div class="chc-readout" id="chc-readout"></div>
      <div class="chc-slots">
        <div class="chc-slot">
          <div class="chc-slot-name">SHD Watch</div>
          <div class="chc-fields">
            <label>Offense CHC ${chcField('shd','10')}</label>
            <span class="chc-namod">maxed = +10%</span>
          </div>
        </div>
        ${weaponRow}
        ${gearRows}
        <div class="chc-slot chc-coyote">
          <div class="chc-slot-name">Coyote's</div>
          <div class="chc-coyote-ctrl">
            ${COYOTE_OPTIONS.map(c => `<button class="chc-coyote-btn ${chc.coyote===c.key?'on':''}" onclick="chcCoyote('${c.key}')" title="${c.note}">${c.label}</button>`).join('')}
            <span class="chc-coyote-note" id="chc-coyote-note">${(COYOTE_OPTIONS.find(c=>c.key===chc.coyote)||{}).note||''}</span>
          </div>
        </div>
      </div>
      <div class="chc-actions"><button class="chc-clear" onclick="chcReset()">Reset all</button></div>
    </div>`;
  updateChcReadout();
}
function updateChcReadout(){
  const total = chcTotal();
  const overCap = total > CHC_CAP;
  const remaining = CHC_CAP - total;
  const pct = Math.min(100, (total / CHC_CAP) * 100);
  const el = document.getElementById('chc-readout');
  if (!el) return;
  el.className = 'chc-readout' + (overCap ? ' over' : Math.abs(total-CHC_CAP)<0.05 ? ' good' : '');
  const status = overCap
    ? `<span class="chc-over">Over cap by ${(total-CHC_CAP).toFixed(1)}% - wasted, move to CHD</span>`
    : Math.abs(total-CHC_CAP)<0.05
      ? `<span class="chc-good">Capped - everything else into CHD</span>`
      : `<span class="chc-under">${remaining.toFixed(1)}% to cap</span>`;
  el.innerHTML = `
    <div class="chc-big">${total.toFixed(1)}<span class="chc-cap">/ ${CHC_CAP}%</span></div>
    <div class="chc-bar"><div class="chc-fill ${overCap?'over':''}" style="width:${pct}%"></div></div>
    <div class="chc-status">${status}</div>`;
}
function chcSet(path, value){
  const parts = path.split('.');
  let o = chc;
  for (let i=0;i<parts.length-1;i++) o = o[parts[i]];
  o[parts[parts.length-1]] = value;
  updateChcReadout();
}
function chcCoyote(key){
  chc.coyote = key;
  renderChcChecker();
}
function chcReset(){
  chc.shd = "";
  chc.weapon = { innate:"", mod1:"", mod2:"", mod3:"" };
  GEAR_SLOTS.forEach(s => chc.gear[s.key] = { innate:"", roll1:"", roll2:"", mod:"" });
  chc.coyote = "none";
  renderChcChecker();
}

// ===== Roll Advisor (A vs B per-shot comparison, session-only) =====
// Compares two configurations on relative per-shot damage. Only the buckets that can change
// which config wins are inputs — amps, RoF/DPS, and headshots are omitted (amps are constant
// multipliers that scale A and B equally; RoF is a DPS axis needing a full sim; headshot rate
// is aim, not a build stat). Base damage is dropped too — this is a unitless relative score.
//
// Per-shot score (relative):
//   score = (1 + WD/100) × (1 + (CHC/100 × CHD/100)) × targetBucket × (1 + DtToC/100)
//   where targetBucket is (1 + DtA/100) vs an armored target, or (1 + DtH/100) vs a health target.
// DtA and DtH never apply to the same bullet, so we show both target states rather than blending
// them with a guessed uptime. CHC clamps at the 60% cap.

function blankRoll(){ return { chc:"", chd:"", wd:"", dta:"", dth:"", dtoc:"" }; }
let rollAdv = { a: blankRoll(), b: blankRoll() };

function rollScore(s, targetState){
  const wd   = 1 + n(s.wd)/100;
  const chc  = Math.min(n(s.chc), CHC_CAP)/100;
  const chd  = n(s.chd)/100;
  const crit = 1 + (chc * chd);
  const dtoc = 1 + n(s.dtoc)/100;
  const targ = targetState === 'armor' ? (1 + n(s.dta)/100) : (1 + n(s.dth)/100);
  return wd * crit * targ * dtoc;
}

function rollField(side, key, ph, note){
  const val = rollAdv[side][key];
  const noteHtml = note ? `<span class="dmg-lab-note"> ${note}</span>` : '';
  return `<div class="dmg-field"><span>${rollLabel(key)}${noteHtml}</span>
    <input class="dmg-f" type="number" step="any" value="${val}" placeholder="${ph}" oninput="rollSet('${side}','${key}',this.value)" /></div>`;
}
function rollLabel(key){
  return ({ chc:"CHC %", chd:"CHD %", wd:"Weapon Dmg %", dta:"Dmg to Armor %",
    dth:"Dmg to Health %", dtoc:"Dmg to OoC %" })[key] || key;
}

function rollCol(side){
  return `
    <div class="dmg-col col-${side}">
      <div class="dmg-col-h">Scenario ${side.toUpperCase()}</div>
      <div class="dmg-sub">Crit</div>
      ${rollField(side,'chc','0','native weapon + SHD watch +10% + brand/set (Ceska, Providence…) + rolls')}
      ${rollField(side,'chd','0','SHD watch +10% + brand/set (Grupo, Sokolov, Negotiator\u2019s…) + rolls')}
      <div class="dmg-sub">Weapon damage</div>
      ${rollField(side,'wd','0','cores 15%/ea + exp 1%/lvl + SHD watch +10% + WD & weapon-type rolls')}

}

// Build the "brands & which field they feed" reference straight from the BRANDS table,
// so it can never drift from the verified data (this is why the table is in the DB).
function brandRefGrid(){
  const wepName = { SMG:"SMG", AR:"AR", Rifle:"Rifle", MMR:"MMR", LMG:"LMG", Shotgun:"Shotgun" };
  // collect tagged bonuses per field
  const buckets = { CHC:[], CHD:[], WD:[], WT:[], DtA:[], DtH:[] };
  Object.entries(BRANDS).forEach(([name, b]) => {
    (b.dmg || []).forEach(d => {
      const short = name
        .replace(/ (S\.A\.|S\.R\.O\.|S\.p\.A\.|SP\. z o\.o\.|GmbH|Concern|Group AB|Holdings|Industries|Armaments|Defense Group|Defense|International|Corporation|Gear|Guard|Tuff|Steelworks|Group|, Harris & Co\.)$/i, '')
        .replace(/,$/, '')
        .trim();
      const wep = d.wep ? ` ${wepName[d.wep]}` : '';
      buckets[d.field].push({ short, txt: `${short} (+${d.val}%${wep}, ${d.pc}pc)`, pc: d.pc });
    });
  });
  const sortRow = arr => arr.sort((a,b)=>a.pc-b.pc || a.short.localeCompare(b.short)).map(x=>x.txt).join(', ');
  const rows = [
    ['CHC', sortRow(buckets.CHC) + ', Coyote\u2019s Mask (proximity)'],
    ['CHD', sortRow(buckets.CHD)],
    ['Weapon Dmg', 'red cores, expertise, WD rolls \u2014 <b>generic WD brands:</b> ' + sortRow(buckets.WD)],
    ['Weapon-type', '<span class="dmg-ref-sub">(only count for that weapon)</span> ' + sortRow(buckets.WT)],
    ['Dmg to Armor', sortRow(buckets.DtA)],
    ['Dmg to Health', sortRow(buckets.DtH)],
    ['Dmg to OoC', 'Fox\u2019s Prayer (Overlord named knees) \u2014 no brand gives this']
  ];
  return `<div class="dmg-ref-grid">${rows.map(([lab, txt]) =>
    `<div class="dmg-ref-cat"><span class="dmg-ref-lab">${lab}</span><span>${txt}</span></div>`
  ).join('')}</div>`;
}

function renderDmgCalc(){
  tabs('dmg-calc');
  document.getElementById("content").innerHTML = `
    ${secHead("Roll Advisor")}
    <div class="dmg-tool">
      <div class="dmg-intro">
        <div class="dmg-intro-lead">Compare two roll setups to see which does more per-shot damage — for deciding where a roll should go (CHC vs CHD vs Weapon Damage vs a target piece like Fox's Prayer).</div>
        <ul class="dmg-intro-list">
          <li>It's a <b>relative score</b>, not a real damage number.</li>
          <li><b>Weapon Dmg %</b> = one summed bucket: red cores (15% each) + expertise (1%/level) + WD rolls + weapon-type dmg.</li>
          <li><b>DtA / DtH</b> never hit the same bullet, so results show two target states: <b>vs armored</b> and <b>vs health</b>.</li>
          <li>Amps, rate of fire, and headshots are left out — they don't change which setup wins.</li>
          <li>CHC caps at 60%.</li>
          <li><b>Reading a close result:</b> this score is an <i>average</i>. It undervalues CHC's consistency — at low CHC most shots don't crit, so damage is swingy in practice. If a config wins only by dropping a big chunk of CHC for a small gain, treat that as a loss, not a win.</li>
        </ul>
        <div class="dmg-ref">
          <div class="dmg-ref-h">Brands &amp; which field they feed</div>
          ${brandRefGrid()}
          <div class="dmg-ref-note">Generated from the verified brand table. Also: Coyote's Mask gives proximity CHC; Fox's Prayer (Overlord named knees) is the only common Dmg-to-OoC source (no brand gives it). A weapon-type brand (e.g. Sokolov's SMG dmg) goes in Weapon Dmg, only for that weapon.</div>
        </div>
      </div>
      <div class="dmg-actions">
        <button class="dmg-copy" onclick="rollCopyAtoB()">Copy A → B</button>
        <button class="dmg-clear" onclick="rollReset()">Reset all</button>
      </div>
      <div class="dmg-cols">
        ${rollCol('a')}
        ${rollCol('b')}
      </div>
      <div id="roll-delta"></div>
    </div>`;
  updateRollOut();
}

function rollOutBlock(s){
  const arm = rollScore(s, 'armor');
  const hp  = rollScore(s, 'health');
  return `
    <div class="dmg-out-grp">
      <div class="dmg-out-row"><span class="k">vs armored</span><span class="v">${arm.toFixed(4)}×</span></div>
      <div class="dmg-out-row"><span class="k">vs health</span><span class="v">${hp.toFixed(4)}×</span></div>
    </div>`;
}

function rollDeltaRow(label, av, bv){
  const pct = (bv/av - 1) * 100;
  const cls = Math.abs(pct) < 0.005 ? 'flat' : (pct > 0 ? 'up' : 'down');
  const sign = pct > 0 ? '+' : '';
  const txt = Math.abs(pct) < 0.005 ? 'even' : `${sign}${pct.toFixed(2)}%`;
  const winner = Math.abs(pct) < 0.005 ? '' : (pct > 0 ? ' (B wins)' : ' (A wins)');
  return `<div class="dmg-delta-row"><span class="k">${label}</span><span class="v ${cls}">${txt}${winner}</span></div>`;
}

function updateRollOut(){
  const ea = document.getElementById('roll-out-a'); if (ea) ea.innerHTML = rollOutBlock(rollAdv.a);
  const eb = document.getElementById('roll-out-b'); if (eb) eb.innerHTML = rollOutBlock(rollAdv.b);
  const d = document.getElementById('roll-delta'); if (!d) return;
  const filled = (s) => Object.values(s).some(v => v !== "" && v !== null);
  if (filled(rollAdv.a) && filled(rollAdv.b)){
    d.innerHTML = `
      <div class="dmg-delta">
        <div class="dmg-delta-h">B vs A</div>
        ${rollDeltaRow('vs armored target', rollScore(rollAdv.a,'armor'), rollScore(rollAdv.b,'armor'))}
        ${rollDeltaRow('vs health target',  rollScore(rollAdv.a,'health'), rollScore(rollAdv.b,'health'))}
      </div>`;
  } else {
    d.innerHTML = `<div class="dmg-delta"><div class="dmg-delta-h">B vs A</div><div class="dmg-delta-row"><span class="k">Fill both scenarios to compare</span><span class="v flat"></span></div></div>`;
  }
}

function rollSet(side, key, value){ rollAdv[side][key] = value; updateRollOut(); }
function rollCopyAtoB(){ rollAdv.b = JSON.parse(JSON.stringify(rollAdv.a)); renderDmgCalc(); }
function rollReset(){ rollAdv = { a: blankRoll(), b: blankRoll() }; renderDmgCalc(); }
